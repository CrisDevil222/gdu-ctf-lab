events {
    worker_connections 1024;
}

http {
    upstream ctfd {
        server ctfd:8000;
    }
    upstream sqli {
        server web-sqli-easy:5000;
    }
    upstream xss {
        server web-xss-easy:5000;
    }
    upstream idor {
        server web-idor-medium:5000;
    }
    upstream ssti {
        server web-ssti-hard:5000;
    }
    upstream caesar {
        server crypto-caesar-easy:5000;
    }
    upstream stego {
        server forensics-stego-easy:5000;
    }

    server {
        listen 80;
        server_name _;

        # CTFd Platform
        location / {
            proxy_pass http://ctfd;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 100M;
        }

        # Web Challenges
        location /web/sqli/ {
            proxy_pass http://sqli/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /web/xss/ {
            proxy_pass http://xss/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /web/idor/ {
            proxy_pass http://idor/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /web/ssti/ {
            proxy_pass http://ssti/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Crypto Challenges
        location /crypto/caesar/ {
            proxy_pass http://caesar/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Forensics Challenges
        location /forensics/stego/ {
            proxy_pass http://stego/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # RE Challenges
        location /re/strings/ {
            proxy_pass http://re-strings-easy:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /re/xor/ {
            proxy_pass http://re-xor-easy:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /re/base64/ {
            proxy_pass http://re-base64-easy:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # PWN Challenges
        location /pwn/bof/ {
            proxy_pass http://pwn-bof-easy:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /pwn/ret2win/ {
            proxy_pass http://pwn-ret2win-easy:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Misc Challenges
        location /misc/morse/ {
            proxy_pass http://misc-morse-easy:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # OSINT Challenges
        location /osint/metadata/ {
            proxy_pass http://osint-metadata-easy:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

    }
}