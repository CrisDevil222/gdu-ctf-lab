events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # Static files cho landing page
        location /static/ {
            proxy_pass http://landing:5000/static/;
            proxy_set_header Host $host;
        }

        # Trang chu - Flask landing page
        location = / {
            proxy_pass http://landing:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # CTFd - tat ca route con lai
        location / {
            proxy_pass http://ctfd:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Challenge services (Đã sửa toàn bộ thành Port nội bộ)
        location /web/sqli/        { proxy_pass http://web-sqli-easy:5000/; }
        location /web/xss/         { proxy_pass http://web-xss-easy:5000/; }
        location /web/idor/        { proxy_pass http://web-idor-medium:5000/; }
        location /web/ssti/        { proxy_pass http://web-ssti-hard:5000/; }
        location /crypto/caesar/   { proxy_pass http://crypto-caesar-easy:5000/; }
        location /forensics/stego/ { proxy_pass http://forensics-stego-easy:5000/; }
        location /re/strings/      { proxy_pass http://re-strings-easy:5000/; }
        location /re/xor/          { proxy_pass http://re-xor-easy:5000/; }
        # Đã xóa dòng re-base64 vì bạn đã gỡ nó khỏi hệ thống
        location /pwn/bof/         { proxy_pass http://pwn-bof-easy:5000/; }
        location /pwn/ret2win/     { proxy_pass http://pwn-ret2win-easy:5000/; }
        location /misc/morse/      { proxy_pass http://misc-morse-easy:5000/; }
        location /osint/metadata/  { proxy_pass http://osint-metadata-easy:5000/; }
    }
}