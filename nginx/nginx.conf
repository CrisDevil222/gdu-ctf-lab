events {
    worker_connections 1024;
}

http {
    upstream ctfd {
        server ctfd:8000;
    }
    upstream sqli {
        server web-sqli-easy:5000;
    }
    upstream xss {
        server web-xss-easy:5000;
    }
    upstream idor {
        server web-idor-medium:5000;
    }
    upstream ssti {
        server web-ssti-hard:5000;
    }
    upstream caesar {
        server crypto-caesar-easy:5000;
    }
    upstream stego {
        server forensics-stego-easy:5000;
    }

    server {
        listen 80;
        server_name _;

        # CTFd Platform
        location / {
            proxy_pass http://ctfd;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 100M;
        }

        # Web Challenges
        location /web/sqli/ {
            proxy_pass http://sqli/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /web/xss/ {
            proxy_pass http://xss/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /web/idor/ {
            proxy_pass http://idor/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /web/ssti/ {
            proxy_pass http://ssti/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Crypto Challenges
        location /crypto/caesar/ {
            proxy_pass http://caesar/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Forensics Challenges
        location /forensics/stego/ {
            proxy_pass http://stego/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}