services:
  # ─────────────────────────────────────────
  # Landing Page
  # ─────────────────────────────────────────
  landing:
    build: ./Landing
    container_name: landing
    restart: always
    volumes:
      - ./shared_state:/shared_state
    networks:
      - ctf_network
    ports:
      - "5000:5000"

  # ─────────────────────────────────────────
  # CTFd Platform
  # ─────────────────────────────────────────
  ctfd:
    image: ctfd/ctfd:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd@db/ctfd
      - REDIS_URL=redis://cache:6379
      - SECRET_KEY=supersecretkey_change_this
      - WORKERS=4
    depends_on:
      - db
      - cache
    volumes:
      - ctfd_data:/var/log/CTFd
      - ctfd_uploads:/var/uploads
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # Database & Cache
  # ─────────────────────────────────────────
  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ctfd
      - MYSQL_USER=ctfd
      - MYSQL_PASSWORD=ctfd
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ctf_network

  cache:
    image: redis:7-alpine
    restart: always
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - ctfd
      - landing
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./shared_state:/shared_state:ro
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # WEB CHALLENGES
  # ─────────────────────────────────────────
  web-sqli-easy:
    build: ./challenges/web/sqli-easy
    restart: always
    ports:
      - "5001:5000"
    environment:
      - FLAG=${FLAG_WEB_SQLI_EASY}
    networks:
      - ctf_network

  web-xss-easy:
