version: '3.8'

services:
  # ─────────────────────────────────────────
  # CTFd Platform
  # ─────────────────────────────────────────
  ctfd:
    image: ctfd/ctfd:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd@db/ctfd
      - REDIS_URL=redis://cache:6379
      - SECRET_KEY=supersecretkey_change_this
      - WORKERS=4
    depends_on:
      - db
      - cache
    volumes:
      - ctfd_data:/var/log/CTFd
      - ctfd_uploads:/var/uploads
    networks:
      - ctf_network

  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ctfd
      - MYSQL_USER=ctfd
      - MYSQL_PASSWORD=ctfd
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ctf_network

  cache:
    image: redis:7-alpine
    restart: always
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ctfd
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # WEB CHALLENGES
  # ─────────────────────────────────────────
  web-sqli-easy:
    build: ./challenges/web/sqli-easy
    restart: always
    ports:
      - "5001:5000"
    networks:
      - ctf_network

  web-xss-easy:
    build: ./challenges/web/xss-easy
    restart: always
    ports:
      - "5002:5000"
    networks:
      - ctf_network

  web-idor-medium:
    build: ./challenges/web/idor-medium
    restart: always
    ports:
      - "5003:5000"
    networks:
      - ctf_network

  web-ssti-hard:
    build: ./challenges/web/ssti-hard
    restart: always
    ports:
      - "5004:5000"
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # CRYPTO CHALLENGES
  # ─────────────────────────────────────────
  crypto-caesar-easy:
    build: ./challenges/crypto/caesar-easy
    restart: always
    ports:
      - "6001:5000"
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # FORENSICS CHALLENGES
  # ─────────────────────────────────────────
  forensics-stego-easy:
    build: ./challenges/forensics/stego-easy
    restart: always
    ports:
      - "7001:5000"
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # REVERSE ENGINEERING
  # ─────────────────────────────────────────
  re-strings-easy:
    build: ./challenges/re/strings-easy
    restart: always
    ports:
      - "8001:5000"
    environment:
      - FLAG=CTF{str1ngs_t00l_1s_y0ur_fr13nd}
    networks:
      - ctf_network

  re-xor-easy:
    build: ./challenges/re/xor-easy
    restart: always
    ports:
      - "8002:5000"
    environment:
      - FLAG=CTF{x0r_1s_s1mpl3_crypt0}
    networks:
      - ctf_network

  re-base64-easy:
    build: ./challenges/re/base64-re-easy
    restart: always
    ports:
      - "8003:5000"
    environment:
      - FLAG=CTF{b4s364_1n_b1n4ry_3ncod1ng}
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # PWN
  # ─────────────────────────────────────────
  pwn-bof-easy:
    build: ./challenges/pwn/bof-easy
    restart: always
    ports:
      - "9001:5000"
    environment:
      - FLAG=CTF{buff3r_0v3rfl0w_smash_th3_st4ck}
    networks:
      - ctf_network

  pwn-ret2win-easy:
    build: ./challenges/pwn/ret2win-easy
    restart: always
    ports:
      - "9002:5000"
    environment:
      - FLAG=CTF{r3t2w1n_y0u_c0ntr0l_rip}
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # MISC
  # ─────────────────────────────────────────
  misc-morse-easy:
    build: ./challenges/misc/morse-easy
    restart: always
    ports:
      - "10001:5000"
    environment:
      - FLAG=CTF{m0rs3_c0d3_1s_fun}
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # OSINT
  # ─────────────────────────────────────────
  osint-metadata-easy:
    build: ./challenges/osint/metadata-easy
    restart: always
    ports:
      - "11001:5000"
    environment:
      - FLAG=CTF{3x1f_m3t4d4t4_l34ks}
    networks:
      - ctf_network

volumes:
  ctfd_data:
  ctfd_uploads:
  mysql_data:

networks:
  ctf_network:
    driver: bridge