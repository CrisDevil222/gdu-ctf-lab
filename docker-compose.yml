version: '3.8'

services:
  # ─────────────────────────────────────────
  # CTFd Platform
  # ─────────────────────────────────────────
  ctfd:
    image: ctfd/ctfd:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd@db/ctfd
      - REDIS_URL=redis://cache:6379
      - SECRET_KEY=supersecretkey_change_this
      - WORKERS=4
    depends_on:
      - db
      - cache
    volumes:
      - ctfd_data:/var/log/CTFd
      - ctfd_uploads:/var/uploads
    networks:
      - ctf_network

  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ctfd
      - MYSQL_USER=ctfd
      - MYSQL_PASSWORD=ctfd
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ctf_network

  cache:
    image: redis:7-alpine
    restart: always
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ctfd
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # WEB CHALLENGES
  # ─────────────────────────────────────────
  web-sqli-easy:
    build: ./challenges/web/sqli-easy
    restart: always
    ports:
      - "5001:5000"
    networks:
      - ctf_network

  web-xss-easy:
    build: ./challenges/web/xss-easy
    restart: always
    ports:
      - "5002:5000"
    networks:
      - ctf_network

  web-idor-medium:
    build: ./challenges/web/idor-medium
    restart: always
    ports:
      - "5003:5000"
    networks:
      - ctf_network

  web-ssti-hard:
    build: ./challenges/web/ssti-hard
    restart: always
    ports:
      - "5004:5000"
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # CRYPTO CHALLENGES
  # ─────────────────────────────────────────
  crypto-caesar-easy:
    build: ./challenges/crypto/caesar-easy
    restart: always
    ports:
      - "6001:5000"
    networks:
      - ctf_network

  # ─────────────────────────────────────────
  # FORENSICS CHALLENGES
  # ─────────────────────────────────────────
  forensics-stego-easy:
    build: ./challenges/forensics/stego-easy
    restart: always
    ports:
      - "7001:5000"
    networks:
      - ctf_network

volumes:
  ctfd_data:
  ctfd_uploads:
  mysql_data:

networks:
  ctf_network:
    driver: bridge
